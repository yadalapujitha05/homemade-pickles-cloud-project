# Nginx Reverse Proxy Configuration
# File location: /etc/nginx/sites-available/homemade_pickles
# 
# This proxies public HTTP traffic (port 80) to the Gunicorn app (port 5000).

server {
    listen 80;
    server_name _;   # Replace with your EC2 Public IP or domain name

    # Maximum upload size (for future image uploads)
    client_max_body_size 10M;

    # Serve static files directly via Nginx (faster than Flask)
    location /static/ {
        alias /home/ec2-user/homemade_pickles/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy all other requests to Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Custom 502 error page when Gunicorn is down
    error_page 502 /502.html;
    location = /502.html {
        return 502 "Application is starting up. Please try again in a moment.";
    }
}
